[build]
  command = "npm run build"
  publish = "out"

# Next.js static export writes per-route index.html files (e.g. out/about/index.html).
# No SPA fallback redirect needed — each route has its own real HTML file.

# Security & performance headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache Next.js hashed static assets forever
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images and videos
[[headers]]
  for = "/Images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Don't cache HTML (so new deploys propagate instantly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# llms.txt — serve as plain text
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"
